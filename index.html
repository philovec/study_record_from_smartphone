<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学習記録入力</title>
    <style>
        /* --- モバイル向けに最適化したCSS --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h2 {
            margin-top: 0;
            font-size: 20px;
            text-align: center;
            color: #1f2937;
        }
        .nav-link {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #e5e7eb; /* 薄いグレー */
            color: #374151;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        .nav-link:active {
            background-color: #d1d5db;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: bold;
            color: #4b5563;
        }
        /* スマホで押しやすいように大きめの入力欄にする */
        input[type="text"],
        input[type="number"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 12px;
            font-size: 16px; /* 16px未満だとiPhoneでズームされてしまうため */
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #f9fafb;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        /* 送信ボタンの装飾 */
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #2563eb;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        button:active {
            background-color: #1d4ed8;
        }
        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
        /* メッセージ表示エリア */
        #message {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            min-height: 20px;
        }
        .success { color: #16a34a; }
        .error { color: #dc2626; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 学習記録の入力</h2>
    <a href="timer.html" class="nav-link">⏱️ タイマーで記録する画面へ ➡️</a>
    <form id="recordForm">
        <div class="form-group">
            <label for="target_date">日付</label>
            <input type="date" id="target_date" required>
        </div>

        <div class="form-group">
            <label for="subject_name">科目名</label>
            <input type="text" id="subject_name" list="subject_list" placeholder="例: データベース設計" required autocomplete="off">
            <datalist id="subject_list"></datalist>
        </div>

        <div class="form-group">
            <label for="minutes">学習時間（分）</label>
            <input type="number" id="minutes" placeholder="例: 90" inputmode="numeric" required>
        </div>

        <div class="form-group">
            <label for="note">メモ（任意）</label>
            <textarea id="note" placeholder="学習内容や気づきなど"></textarea>
        </div>

        <button type="submit" id="submitBtn">記録を送信</button>
    </form>
    <div id="message"></div>
</div>

<script>
    // --- 初期設定 ---
    // 今日の日付をデフォルトでセットする
    const dateInput = document.getElementById('target_date');
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    dateInput.value = `${yyyy}-${mm}-${dd}`;

    // --- localStorage から科目リストを管理する処理 ---
    const subjectList = document.getElementById('subject_list');
    
    // localStorage からデータを取得（なければ空の配列）
    localStorage.setItem('myStudySubjects', JSON.stringify(['OSS-DB silver', 'Python3 エンジニア基礎', 'Python3 エンジニアデータ分析', 'Linuc レベル1', '財務会計論', '管理会計論', '監査論', '企業法', '租税法', '民法', '刑法', '行政法', 'その他法学部科目']));
    let savedSubjects = JSON.parse(localStorage.getItem('myStudySubjects')) || [];

    // datalist に選択肢を展開する関数
    function renderSubjectList() {
        subjectList.innerHTML = ''; // 一旦クリア
        savedSubjects.forEach(subject => {
            const option = document.createElement('option');
            option.value = subject;
            subjectList.appendChild(option);
        });
    }

    // 新しい科目を保存する関数
    function saveSubjectLocally(newSubject) {
        // まだ保存されていない科目なら追加する
        if (!savedSubjects.includes(newSubject)) {
            savedSubjects.push(newSubject);
            // localStorage に JSON 形式で保存
            localStorage.setItem('myStudySubjects', JSON.stringify(savedSubjects));
            // datalist を更新
            renderSubjectList();
        }
    }

    // 画面読み込み時にリストを展開
    renderSubjectList();
    // ------------------------------------------------

    // --- 送信処理 ---
    document.getElementById('recordForm').addEventListener('submit', async (e) => {
        e.preventDefault(); // 画面の再読み込みを防ぐ

        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        
        // 二重送信防止のためボタンを無効化
        submitBtn.disabled = true;
        submitBtn.textContent = '送信中...';
        messageDiv.textContent = '';
        messageDiv.className = '';

        // 入力データの取得
        const payload = {
            target_date: document.getElementById('target_date').value,
            subject_name: document.getElementById('subject_name').value,
            minutes: document.getElementById('minutes').value,
            note: document.getElementById('note').value
        };

        // TODO: ここに後で作成するGASのWebアプリURL（デプロイURL）を貼り付けます
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbx9oPu4rH8l1CSkpleRmjyimZ0HcXfzOpBJHdUEHXi7bStDXmcXmoSJtr7ccX4hZ8BaTA/exec';

        try {
            // GASへデータ送信 (CORS回避のための text/plain 指定)
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain', 
                },
                body: JSON.stringify(payload)
            });

            // 成功時の処理
            saveSubjectLocally(payload.subject_name);
            messageDiv.textContent = '✅ 記録を保存しました！';
            messageDiv.className = 'success';
            
            // フォームをリセットし、日付だけ今日に戻す
            document.getElementById('recordForm').reset();
            dateInput.value = `${yyyy}-${mm}-${dd}`;

        } catch (error) {
            // ネットワークエラー等の処理
            console.error('Error:', error);
            messageDiv.textContent = '❌ エラーが発生しました。通信環境を確認してください。';
            messageDiv.className = 'error';
        } finally {
            // ボタンを元の状態に戻す
            submitBtn.disabled = false;
            submitBtn.textContent = '記録を送信';
            
            // 3秒後にメッセージを消す
            setTimeout(() => {
                messageDiv.textContent = '';
            }, 3000);
        }
    });
</script>

</body>
</html>
